version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=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
      - OPENAI_MODEL=openrouter/free
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
