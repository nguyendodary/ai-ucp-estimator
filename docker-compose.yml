version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=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
      - OPENAI_MODEL=openrouter/free
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
