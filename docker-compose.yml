version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=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
      - OPENAI_MODEL=google/gemma-4-31b-it:free
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
